name: Build

on:
  push:
    # branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: adaptiveview-${{ github.sha }}
          path: build/libs/*.jar
          retention-days: 14
